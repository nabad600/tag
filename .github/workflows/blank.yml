name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main", "pre-release"]

jobs:
  build:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest-tag
        run: |
          git fetch --tags

          latestTag=$(git tag --sort=-creatordate | head -n 1)

          echo "Latest tag: $latestTag"
          echo "version=$latestTag" >> $GITHUB_OUTPUT
          echo "VERSION=$latestTag" >> $GITHUB_ENV

      - name: Print version
        run: |
          echo "Version: $VERSION"
